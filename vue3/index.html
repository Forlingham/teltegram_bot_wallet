<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/img/logo-128x128.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f5f7f9" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <title>SCASH 钱包</title>
    <style>
      /* Pre-Vue loading screen */
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #f5f7f9;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .app-loading-logo {
        width: 64px;
        height: 64px;
        margin-bottom: 20px;
        animation: app-loading-pulse 1.8s ease-in-out infinite;
      }
      .app-loading-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(145, 40, 173, 0.15);
        border-top-color: #9128ad;
        border-radius: 50%;
        animation: app-loading-spin 0.8s linear infinite;
      }
      .app-loading-text {
        margin-top: 16px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
        letter-spacing: 0.05em;
      }
      @keyframes app-loading-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes app-loading-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.08); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <img src="/img/logo-128x128.png" class="app-loading-logo" alt="SCASH" />
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">正在启动 SCASH 钱包…</div>
    </div>
    <div id="app"></div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function () {
        var params = new URL(location.href).searchParams;
        var debugParam = params.get('debug');
        if (debugParam === '1') localStorage.setItem('DEBUG_CONSOLE', '1');
        if (debugParam === '0') localStorage.removeItem('DEBUG_CONSOLE');

        var enabled = localStorage.getItem('DEBUG_CONSOLE') === '1';
        if (!enabled) return;

        document.querySelectorAll('a[href^="/"]').forEach(function (a) {
          try {
            var u = new URL(a.href, location.origin);
            u.searchParams.set('debug', '1');
            a.href = u.pathname + u.search + u.hash;
          } catch (_) {}
        });

        if (window.eruda) {
          window.eruda.show();
          return;
        }

        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = function () { if (window.eruda) window.eruda.init(); };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
